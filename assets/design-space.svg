<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect x="0" y="0" width="1100" height="500" rx="16" fill="#0b0b0c"/>

  <text x="56" y="62" font-family="system-ui, sans-serif" font-size="26" font-weight="700" fill="#ededed">clamp() for design space</text>
  <text x="56" y="92" font-size="14" fill="#9aa0a6">Restrict a variable font to exactly the instances a customer bought — ship that range, nothing more.</text>

  <rect x="120" y="150" width="860" height="240" fill="#141418" stroke="#2a2a31" stroke-width="1"/>
  <g stroke="#22222a" stroke-width="1">
    <line x1="442" y1="150" x2="442" y2="390"/>
    <line x1="765" y1="150" x2="765" y2="390"/>
  </g>

  <rect x="442" y="150" width="323" height="240" fill="#8ab4ff" fill-opacity="0.16" stroke="#8ab4ff" stroke-width="1.5"/>
  <text x="603" y="262" text-anchor="middle" font-size="15" fill="#cfe0ff">Text</text>
  <text x="603" y="282" text-anchor="middle" font-size="12" fill="#9aa0a6">wght 400–700</text>

  <rect x="765" y="150" width="215" height="240" fill="#67f4b8" fill-opacity="0.16" stroke="#67f4b8" stroke-width="1.5"/>
  <text x="872" y="262" text-anchor="middle" font-size="15" fill="#bff6e1">Display</text>
  <text x="872" y="282" text-anchor="middle" font-size="12" fill="#9aa0a6">wght 700–900</text>

  <line x1="120" y1="390" x2="980" y2="390" stroke="#f7b955" stroke-width="2.5"/>

  <rect x="120" y="150" width="860" height="240" fill="none" stroke="#52525b" stroke-width="1.5" stroke-dasharray="5 4"/>

  <text x="120" y="416" font-size="12" fill="#71717a">wght 100</text>
  <text x="430" y="416" font-size="12" fill="#71717a">400</text>
  <text x="753" y="416" font-size="12" fill="#71717a">700</text>
  <text x="952" y="416" font-size="12" fill="#71717a">900</text>
  <text x="56" y="156" font-size="12" fill="#71717a">opsz 32</text>
  <text x="56" y="392" font-size="12" fill="#71717a">opsz 14</text>

  <g font-size="13" fill="#9aa0a6">
    <rect x="120" y="452" width="22" height="14" fill="none" stroke="#52525b" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="150" y="463">full design space</text>
    <rect x="305" y="452" width="22" height="14" fill="#8ab4ff" fill-opacity="0.16" stroke="#8ab4ff" stroke-width="1.5"/>
    <text x="335" y="463">clamped to a range (axis stays variable)</text>
    <line x1="700" y1="459" x2="722" y2="459" stroke="#f7b955" stroke-width="2.5"/>
    <text x="730" y="463">pinned (axis removed from output)</text>
  </g>
</svg>
