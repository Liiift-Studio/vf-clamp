<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="420" viewBox="0 0 1100 420" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect x="0" y="0" width="1100" height="420" rx="16" fill="#0b0b0c"/>

  <text x="56" y="58" font-family="system-ui, sans-serif" font-size="25" font-weight="700" fill="#ededed">Clamp to the styles a customer bought</text>
  <text x="56" y="86" font-size="14" fill="#9aa0a6">Pick adjacent named instances — ship a variable font scoped to exactly that range.</text>

  <!-- weight axis maps 100..900 to x 150..980 -->
  <!-- positions: 100=150 200=254 300=357 400=461 500=565 600=669 700=773 800=876 900=980 -->

  <!-- ROW A: full family -->
  <text x="56" y="158" font-size="12" fill="#71717a">FULL FAMILY</text>
  <text x="56" y="176" font-size="12" fill="#52525b">9 instances</text>
  <line x1="150" y1="168" x2="980" y2="168" stroke="#3a3a42" stroke-width="6" stroke-linecap="round"/>
  <g fill="#8ab4ff">
    <circle cx="150" cy="168" r="6"/><circle cx="254" cy="168" r="6"/><circle cx="357" cy="168" r="6"/>
    <circle cx="461" cy="168" r="6"/><circle cx="565" cy="168" r="6"/><circle cx="669" cy="168" r="6"/>
    <circle cx="773" cy="168" r="6"/><circle cx="876" cy="168" r="6"/><circle cx="980" cy="168" r="6"/>
  </g>
  <text x="150" y="198" font-size="11" fill="#71717a" text-anchor="middle">Thin</text>
  <text x="980" y="198" font-size="11" fill="#71717a" text-anchor="middle">Black</text>
  <text x="150" y="212" font-size="10" fill="#52525b" text-anchor="middle">wght 100</text>
  <text x="980" y="212" font-size="10" fill="#52525b" text-anchor="middle">900</text>

  <!-- customer purchase -->
  <text x="56" y="258" font-size="13" fill="#cfe0ff">buy Light → Bold ↓</text>

  <!-- ROW B: clamped output -->
  <text x="56" y="316" font-size="12" fill="#71717a">CLAMPED</text>
  <text x="56" y="334" font-size="12" fill="#52525b">OUTPUT</text>

  <!-- removed segments (faded) -->
  <line x1="150" y1="326" x2="357" y2="326" stroke="#2a2a31" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 7"/>
  <line x1="773" y1="326" x2="980" y2="326" stroke="#2a2a31" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 7"/>
  <!-- kept range (variable) -->
  <line x1="357" y1="326" x2="773" y2="326" stroke="#67f4b8" stroke-width="6" stroke-linecap="round"/>

  <!-- removed instance dots (hollow) -->
  <g fill="#0b0b0c" stroke="#52525b" stroke-width="1.5">
    <circle cx="150" cy="326" r="5.5"/><circle cx="254" cy="326" r="5.5"/>
    <circle cx="876" cy="326" r="5.5"/><circle cx="980" cy="326" r="5.5"/>
  </g>
  <!-- kept instance dots (solid) -->
  <g fill="#67f4b8">
    <circle cx="357" cy="326" r="6"/><circle cx="461" cy="326" r="6"/><circle cx="565" cy="326" r="6"/>
    <circle cx="669" cy="326" r="6"/><circle cx="773" cy="326" r="6"/>
  </g>
  <text x="357" y="306" font-size="11" fill="#bff6e1" text-anchor="middle">Light</text>
  <text x="773" y="306" font-size="11" fill="#bff6e1" text-anchor="middle">Bold</text>

  <!-- bracket under kept range -->
  <path d="M357 344 L357 352 L773 352 L773 344" fill="none" stroke="#67f4b8" stroke-width="1.5"/>
  <text x="565" y="372" font-size="12" fill="#9aa0a6" text-anchor="middle">still variable across this range · wght 300–700</text>
  <text x="254" y="372" font-size="11" fill="#52525b" text-anchor="middle">masters removed</text>
  <text x="876" y="372" font-size="11" fill="#52525b" text-anchor="middle">masters removed</text>

  <!-- legend -->
  <g font-size="12.5" fill="#9aa0a6">
    <circle cx="156" cy="400" r="5.5" fill="#67f4b8"/>
    <text x="172" y="404">kept (variable in range)</text>
    <circle cx="420" cy="400" r="5.5" fill="#0b0b0c" stroke="#52525b" stroke-width="1.5"/>
    <text x="436" y="404">removed master (outside the purchase)</text>
  </g>
</svg>
